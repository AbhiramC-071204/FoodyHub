<!DOCTYPE html>
<html>
<head>

<title>Order Successful</title>

<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#111;
color:white;
font-family:sans-serif;
}

.success-box{
text-align:center;
animation:fadeIn 1s ease;
}

.checkmark{
font-size:80px;
color:#2ecc71;
animation:pop 0.6s ease;
}

@keyframes pop{
0%{transform:scale(0);}
100%{transform:scale(1);}
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

button{
margin-top:20px;
padding:10px 20px;
border:none;
background:#ff7e5f;
color:white;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="success-box">

<div class="checkmark">✔</div>

<h1>Payment Successful</h1>

<p>Your order has been placed successfully</p>

<button onclick="window.location='restaurant.jsp'">
Back to Home
</button>

</div>

</body>
</html>
